<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./img/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Aboreto&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Quicksand:wght@300..700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/modern-normalize@2.0.0/modern-normalize.min.css"
    />
    <title>Quell Zen</title>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <load
      src="./partials/header.html"
      icon-burger-btn="./img/sprite.svg#icon-burger-menu"
      icon-close="./img/sprite.svg#icon-btn-close"
    />

    <main>
      <!-- Loads the specified .html file -->
      <load
        src="./partials/hero.html"
        icon-image="./img/sprite.svg#Playstore"
        icon-text-up="./img/sprite.svg#icon-Subtext"
        icon-text-down="./img/sprite.svg#icon-path90"
      />
      <load src="./partials/about.html" />
      <load
        src="./partials/how-to-play.html"
        icon-step1="./img/sprite.svg#icon-step1"
        icon-step2="./img/sprite.svg#icon-step2"
        icon-step3="./img/sprite.svg#icon-step3"
        icon-step4="./img/sprite.svg#icon-step4"
        icon-step5="./img/sprite.svg#icon-step5"
      />
      <load
        src="./partials/features.html"
        icon-feature1="./img/sprite.svg#icon-feature1"
        icon-feature2="./img/sprite.svg#icon-feature2"
        icon-feature3="./img/sprite.svg#icon-feature3"
        icon-feature4="./img/sprite.svg#icon-feature4"
        icon-feature5="./img/sprite.svg#icon-feature5"
      />
      <load
        src="./partials/faq.html"
        icon-arrow="./img/sprite.svg#icon-arrow"
      />
      <load
        src="./partials/contact.html"
        icon-mail="./img/sprite.svg#icon-mail"
      />
    </main>

    <load src="./partials/footer.html" />

    <script type="module" src="./main.js"></script>
  </body>
</html>
